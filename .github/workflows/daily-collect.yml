name: Daily Content Collection

# 매일 KST 06:00 (UTC 21:00) 자동 실행 + 수동 트리거.
# 운영(Vercel)의 /api/cron/collect 를 Bearer 토큰으로 호출.

on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = KST 06:00
  workflow_dispatch:        # Actions 탭에서 수동 실행 가능

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger collection on production
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$PRODUCTION_URL" ]; then
            echo "::error::PRODUCTION_URL Variable 미설정 (Repo Settings → Actions → Variables)"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET Secret 미설정 (Repo Settings → Actions → Secrets)"
            exit 1
          fi

          echo "Triggering: $PRODUCTION_URL/api/cron/collect"
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST "$PRODUCTION_URL/api/cron/collect" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 600)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP $HTTP_CODE"
          echo "$BODY" | head -200

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Collection failed with HTTP $HTTP_CODE"
            exit 1
          fi
